name: Scrape fishing data

on:
  schedule:
    - cron: '0 7,19 * * *'    # 7am and 7pm UTC (midnight and noon PT)
  workflow_dispatch:            # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jobs

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: jobs/requirements.txt

      - run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPER_ARTIFACT_DIR: artifacts
        run: python -m scraper.main

      - name: Upload scraper artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scraper-artifacts
          path: jobs/artifacts/
          retention-days: 14
          if-no-files-found: ignore

  notify:
    needs: scrape
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: scraper-artifacts
          path: artifacts/
        continue-on-error: true

      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh label create scraper-failure --color d73a4a --description "Automated scraper failure alert" --force

      - name: Create or update GitHub issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Build issue body from summary JSON if available
          SUMMARY=""
          if [ -f artifacts/scrape_summary.json ]; then
            SUMMARY=$(python3 jobs/scraper/format_summary.py artifacts/scrape_summary.json)
          fi

          # Check for existing open issue to avoid duplicates
          EXISTING=$(gh issue list --label scraper-failure --state open --limit 1 --json number -q '.[0].number // empty' 2>/dev/null || echo "")

          BODY="## Scraper Failure Report — ${DATE}

          ${SUMMARY:-No summary available (artifacts may not have been produced).}

          ## Links
          - [Workflow run](${RUN_URL})
          - Artifacts: download from the workflow run page above

          ---
          *Auto-generated by scrape workflow*"

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create \
              --title "Scraper failure — ${DATE}" \
              --body "$BODY" \
              --label "scraper-failure" \
              --assignee "NickHeyThatsMe"
          fi

  extract:
    needs: scrape
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jobs

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: jobs/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run LLM extraction
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m extractor.main

  score:
    needs: extract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jobs

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: jobs/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run signal scorer
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scorer.main
