name: Scrape fishing data

on:
  schedule:
    - cron: '0 7,19 * * *'    # 7am and 7pm UTC (midnight and noon PT)
  workflow_dispatch:            # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jobs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: jobs/requirements.txt

      - run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPER_ARTIFACT_DIR: artifacts
        run: python -m scraper.main

      - name: Upload scraper artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-artifacts
          path: jobs/artifacts/
          retention-days: 14
          if-no-files-found: ignore

  notify:
    needs: scrape
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: scraper-artifacts
          path: artifacts/
        continue-on-error: true

      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh label create scraper-failure --color d73a4a --description "Automated scraper failure alert" --force

      - name: Create or update GitHub issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Build issue body from summary JSON if available
          SUMMARY=""
          if [ -f artifacts/scrape_summary.json ]; then
            SUMMARY=$(python3 -c "
          import json
          with open('artifacts/scrape_summary.json') as f:
              data = json.load(f)
          failed = [r for r in data['results'] if r['status'] == 'FAILED']
          degraded = [r for r in data['results'] if r['status'] == 'DEGRADED']
          lines = []
          lines.append(f\"Total scrapers: {data['total_scrapers']}\")
          lines.append(f\"Failed: {data['failed']}\")
          lines.append(f\"Degraded: {data['degraded']}\")
          lines.append('')
          for r in failed:
              lines.append(f\"### {r['source_name']} (FAILED)\")
              lines.append(f\"- URL: {r['source_url']}\")
              lines.append(f\"- Error: {r.get('error_message', 'unknown')}\")
              if r.get('traceback'):
                  lines.append('<details><summary>Stack trace</summary>')
                  lines.append('')
                  lines.append('\`\`\`')
                  lines.append(r['traceback'][:2000])
                  lines.append('\`\`\`')
                  lines.append('</details>')
              lines.append('')
          for r in degraded:
              lines.append(f\"### {r['source_name']} (DEGRADED)\")
              lines.append(f\"- URL: {r['source_url']}\")
              if r.get('body_fallback_used'):
                  lines.append('- CSS selector missed — fell back to body text')
              if r.get('posts_failed', 0) > 0:
                  lines.append(f\"- Posts failed: {r['posts_failed']}\")
              lines.append('')
          print('\n'.join(lines))
          ")
          fi

          # Check for existing open issue to avoid duplicates
          EXISTING=$(gh issue list --label scraper-failure --state open --limit 1 --json number -q '.[0].number' 2>/dev/null || echo "")

          BODY="$(cat <<EOF
          ## Scraper Failure Report — ${DATE}

          ${SUMMARY:-No summary available (artifacts may not have been produced).}

          ## Links
          - [Workflow run](${RUN_URL})
          - Artifacts: download from the workflow run page above

          ---
          *Auto-generated by scrape workflow*
          EOF
          )"

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create \
              --title "Scraper failure — ${DATE}" \
              --body "$BODY" \
              --label "scraper-failure" \
              --assignee "NickHeyThatsMe"
          fi

  extract:
    needs: scrape
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jobs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: jobs/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run LLM extraction
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m extractor.main

  score:
    needs: extract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jobs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: jobs/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run signal scorer
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scorer.main
