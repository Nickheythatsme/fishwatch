name: Fetch gauge data

on:
  schedule:
    - cron: '0 */2 * * *'    # Every 2 hours
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jobs

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: jobs/requirements.txt

      - run: pip install -r requirements.txt

      - name: Fetch USGS gauge readings
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scraper.sources.usgs

      - name: Fetch OWRD gauge readings
        # A status-check function in `if` overrides the implicit success() gate,
        # so this still runs when the USGS step fails (but not on cancellation).
        if: ${{ !cancelled() }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scraper.sources.owrd
