name: Refresh forum engagement

on:
  schedule:
    - cron: '0 13 * * *'    # 1pm UTC daily (offset from the 7/19 UTC scrape)
  workflow_dispatch:            # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jobs

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: jobs/requirements.txt

      - run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Refresh forum engagement
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scraper.refresh_engagement

  notify:
    needs: refresh
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh label create refresh-failure --color d73a4a --description "Automated engagement-refresh failure alert" --force

      - name: Create or update GitHub issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Check for an existing open issue to avoid duplicates
          EXISTING=$(gh issue list --label refresh-failure --state open --limit 1 --json number -q '.[0].number // empty' 2>/dev/null || echo "")

          BODY="## Engagement Refresh Failure — ${DATE}

          The forum engagement-refresh job failed. This is either a fatal error (DB
          unreachable) or a systemic scrape failure (most/all forum threads failed —
          likely a layout change, WAF block, or outage). Downstream extract/score were
          skipped for this run.

          ## Links
          - [Workflow run](${RUN_URL})

          ---
          *Auto-generated by the refresh-engagement workflow*"

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create \
              --title "Engagement refresh failure — ${DATE}" \
              --body "$BODY" \
              --label "refresh-failure" \
              --assignee "NickHeyThatsMe"
          fi

  extract:
    needs: refresh
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jobs

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: jobs/requirements.txt

      - run: pip install -r requirements.txt

      # Processes replies that newly crossed the engagement threshold.
      - name: Run LLM extraction
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m extractor.main

  score:
    needs: extract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jobs

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: jobs/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run signal scorer
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m scorer.main
