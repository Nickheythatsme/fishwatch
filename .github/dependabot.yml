version: 2
updates:
  # Python data pipeline
  - package-ecosystem: pip
    directory: /jobs
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Next.js web app (npm workspaces, lockfile at repo root)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Keep the SHA-pinned GitHub Actions current (Dependabot bumps the SHA and
  # the trailing version comment together).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
